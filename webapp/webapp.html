<style>
html {
	overflow-y: scroll;
}
body {
	font-family: 'Outfit', -apple-system, Segoe UI, Ubuntu, Helvetica, Arial, sans-serif;
	background-color: #f8fafc;
	color: #1e293b;
	margin: 0;
}
div#container {
	position: relative;
	width: 70%;
	margin: 2em auto 0 auto;
	}
table {
	border-collapse: collapse;
	width: 100%;
	margin: 3em 0;
	table-layout: fixed;
}
tr {
	border-bottom: 1px solid #ddd;
}
th {
	padding: 5px 0;
	text-align: left;
	font-weight: 600;
}
td {
	padding: 5px 0;
	vertical-align: top;
	word-wrap: break-word;
}
header {
	text-align: center;
	padding: 2em 0;
}
.logo-container {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 0.5em;
}
.logo-text {
	font-size: 3.5em;
	font-weight: 800;
	background: linear-gradient(135deg, #3b82f6 0%, #ec4899 100%);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
	letter-spacing: -2px;
	margin: 0;
	line-height: 1;
	transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
	cursor: default;
}
.logo-text:hover {
	transform: scale(1.05);

header p {
	color: #64748b;
	font-size: 1.1em;
	font-weight: 500;
	margin: 0;
	letter-spacing: 0.05em;
	text-transform: uppercase;
}
div#searchbox {
	display: flex;
	margin: 4em auto 0 auto;
}
input#url {
	font-size: 1.1em;
	height: 2.8em;
	border: 1px solid #ccc;
	border-radius: 5px 0 0 5px;
	padding-left: .75em;
	width: 80%;
	outline: none;
}

	color: white;
	background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
	border: 0;
	border-radius: 0 8px 8px 0;
	height: 2.8em;
	font-size: 1.1em;
	font-weight: 600;
	flex-grow: 1;
	outline: none;
	cursor: pointer;
	transition: all 0.2s ease;
}
button#scan:hover {
	filter: brightness(1.1);
	box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
}

	color: #777;
}
progress {
	-webkit-appearance: none;
	-moz-appearance: none;
	height: 5px;
	width: 100%;

	border: 0;

	background: linear-gradient(90deg, #3b82f6 0%, #ec4899 100%);

<body>
	<div id="container">
		<div>
			<header>
				<div class="logo-container">
					<h1 class="logo-text">sushasan</h1>
					<p>phishing domain scanner</p>
				</div>
			</header>
			<div id="searchbox">
				<input type="hidden" id="sid">
				<input type="text" id="url" placeholder="Enter domain name" autofocus>
				<button id="scan">Scan</button>
			</div>
			<progress id="progress" value="0"></progress>
			<span id="status"></span>
		</div>
		<table id="data"></table>
	</div>
</body>
<script>
window.onload = function() {
	if (window.location.hash) {
		$('#sid').val(window.location.hash.substring(1));
		fetchDomains();
	}
}

last_registered = 0;

function shareResults() {
	navigator.clipboard.writeText(window.location.href.split('#')[0] + '#' + sid);
	$('#status').html('Copied URL to clipboard!');
}

function fetchDomains() {
	$.getJSON('/api/scans/' + $('#sid').val() + '/domains', function(data) {
		$('#data').empty();
		$('<tr>').html(
				'<th>PERMUTATION</th>' +
				'<th>IP ADDRESS</th>' +
				'<th>NAME SERVER</th>' +
				'<th>MAIL SERVER</th>'
			).appendTo('#data');
		$.each(data, function(i, item) {
			$.each(item, function(k, v) {
				if (v instanceof Array) {
					if (v[0] == '!ServFail') {
						data[i][k][0] = '🚫'
					}
				}
			})
			fuzzer = item['fuzzer'] || ''
			permutation = item['domain'] || ''
			ipaddr = [
				(item['dns_a'] || [''])[0],
				(item['dns_aaaa'] || [''])[0]
			].filter(Boolean).join('</br>');
			dns_ns = (item['dns_ns'] || [''])[0];
			dns_mx = (item['dns_mx'] || [''])[0];
			geoip = item['geoip'] || '';
			$('<tr>').html(
				'<td>' + permutation + ' <a href="http://' + permutation + '" id="link">🔗</a></br><sup>' + fuzzer + '</sup></td>' +
				'<td>' + ipaddr + '</br><sup>' + geoip + '</sup></td>' +
				'<td>' + dns_ns + '</td>' +
				'<td>' + dns_mx + '</td>'
			).appendTo('#data');
		});
	});
}

function pollScan() {
    $.getJSON('/api/scans/' + $('#sid').val(), function(data) {
        $('#status').html('Processed ' + data['complete'] + ' of ' + data['total']);
        $('#progress').val(data['complete']/data['total']);
		if (data['remaining'] > 0) {
			setTimeout(pollScan, 250);
		} else {
			sid = $('#sid').val()
			$('#status').html('Scanned <a href="/api/scans/' + sid + '/list">' + data['complete'] + '</a> permutations. Found ' + data['registered'] + ' registered: <a href="#" onclick="shareResults()">share it</a> or download as <a href="/api/scans/' + sid + '/csv">CSV</a> <a href="/api/scans/' + sid + '/json">JSON</a>');
			$('#scan').text('Scan');
		}
		if (last_registered < data['registered']) {
			last_registered = data['registered']
			fetchDomains();
		}
    })
	.fail(function(){
		$('#status').html('Ups! Something went wrong...');
	});
}

function actionScan() {
	if (!$('#url').val()) {
		$('#status').html('↖ You need to type in a domain name first');
		return
	}

	if ($('#scan').text() == 'Scan') {
		last_registered = 0;
		$('#scan').text('⏱');
		$.post({
			url: '/api/scans',
			data: JSON.stringify({'url': $('#url').val()}),
			contentType: 'application/json',
			success: function(data) {
				$('#sid').val(data['id']);
				$('#url').val(data['domain']);
				$('#scan').text('Stop');
				pollScan();
			},
			error: function(xhr, status, error) {
				$('#scan').text('Scan');
				$('#status').html(xhr.responseJSON['message'] || 'Something went wrong');
			},
		});
	} else {
		$('#scan').text('⏱');
		$.post({
			url: '/api/scans/' + $('#sid').val() + '/stop',
			contentType: 'application/json',
		})
		.always(function() {
			$('#scan').text('Scan');
		});
	}
}

$('#scan').click(function() {
	actionScan();
});

$('#url').on('keypress',function(e) {
    if(e.which == 13) {
        actionScan();
    }
});
</script>
