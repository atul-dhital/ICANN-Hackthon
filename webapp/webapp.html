<style>
:root {
	--primary: #003366;
	--secondary: #22c55e;
	--accent: #dc2626;
	--bg: #ffffff;
	--bg-alt: #f1f5f9;
	--text: #1e293b;
	--text-muted: #64748b;
	--border: #e2e8f0;
}
html {
	overflow-y: scroll;
}
body {
	font-family: 'Outfit', -apple-system, Segoe UI, Ubuntu, Helvetica, Arial, sans-serif;
	background-color: var(--bg-alt);
	color: var(--text);
	margin: 0;
	line-height: 1.5;
}
header {
	background-color: var(--bg);
	border-bottom: 3px solid var(--primary);
	padding: 1.5rem 0;
	box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
	position: sticky;
	top: 0;
	z-index: 100;
}
div#container {
	position: relative;
	width: 80%;
	max-width: 1200px;
	margin: 2rem auto;
	background: var(--bg);
	padding: 2rem;
	border-radius: 12px;
	box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
}
.header-content {
	text-align: center;
	margin-bottom: 2rem;
}
.logo-container {
	display: inline-flex;
	flex-direction: column;
	align-items: center;
}
.logo-text {
	font-size: 3rem;
	font-weight: 800;
	color: var(--primary);
	letter-spacing: -1.5px;
	margin: 0;
	line-height: 1;
	text-transform: lowercase;
}
.tagline {
	color: var(--text-muted);
	font-size: 0.9rem;
	font-weight: 600;
	margin-top: 0.25rem;
	letter-spacing: 0.1em;
	text-transform: uppercase;
}
div#searchbox {
	display: flex;
	gap: 0;
	max-width: 800px;
	margin: 0 auto 1.5rem auto;
}
input#url {
	font-size: 1.1rem;
	height: 3.5rem;
	border: 2px solid var(--border);
	border-radius: 8px 0 0 8px;
	padding: 0 1.5rem;
	width: 100%;
	outline: none;
	transition: border-color 0.2s;
}
input#url:focus {
	border-color: var(--primary);
}
button#scan {
	color: white;
	background-color: var(--primary);
	border: 0;
	border-radius: 0 8px 8px 0;
	height: 3.5rem;
	padding: 0 2rem;
	font-size: 1.1rem;
	font-weight: 700;
	cursor: pointer;
	transition: all 0.2s;
}
button#scan:hover {
	background-color: #002244;
	transform: translateY(-1px);
}
progress {
	-webkit-appearance: none;
	-moz-appearance: none;
	appearance: none;
	height: 8px;
	width: 100%;
	background-color: var(--border);
	border-radius: 4px;
	border: 0;
	margin: 1rem 0;
	overflow: hidden;
}
progress::-webkit-progress-bar {
	background-color: var(--border);
}
progress::-webkit-progress-value {
	background-color: var(--secondary);
}
progress::-moz-progress-bar {
	background-color: var(--secondary);
}
span#status {
	display: block;
	text-align: right;
	font-size: 0.85rem;
	color: var(--text-muted);
	font-weight: 500;
}
table {
	border-collapse: collapse;
	width: 100%;
	margin-top: 2rem;
	table-layout: fixed;
}
thead tr {
	border-bottom: 2px solid var(--primary);
}
th {
	padding: 1rem 0.5rem;
	text-align: left;
	font-weight: 700;
	color: var(--primary);
	font-size: 0.9rem;
	text-transform: uppercase;
}
td {
	padding: 1rem 0.5rem;
	vertical-align: top;
	border-bottom: 1px solid var(--border);
	word-wrap: break-word;
	font-size: 0.95rem;
}
tr:hover td {
	background-color: #f8fafc;
}
sup {
	color: var(--text-muted);
	font-size: 0.75rem;
}
a {
	color: var(--primary);
	text-decoration: none;
	font-weight: 600;
}
a:hover {
	text-decoration: underline;
}
@media (max-width: 800px) {
	div#container {
		width: 95%;
		padding: 1rem;
	}
	.logo-text {
		font-size: 2rem;
	}
	table, thead, tbody, th, td, tr {
		display: block;
	}
	thead tr {
		position: absolute;
		top: -9999px;
		left: -9999px;
	}
	tr {
		border: 1px solid var(--border);
		margin-bottom: 1rem;
		border-radius: 8px;
		padding: 0.5rem;
	}
	td {
		border: none;
		position: relative;
		padding-left: 50%;
	}
	td:before {
		position: absolute;
		left: 0.5rem;
		width: 45%;
		padding-right: 10px;
		white-space: nowrap;
		content: attr(data-label);
		font-weight: bold;
		color: var(--primary);
	}
}
</style>
</head>
<body>
	<header>
		<div class="header-content">
			<div class="logo-container">
				<h1 class="logo-text">sushasan</h1>
				<p class="tagline">phishing domain scanner</p>
			</div>
		</div>
	</header>
	<div id="container">
		<div id="searchbox">
			<input type="hidden" id="sid">
			<input type="text" id="url" placeholder="Enter domain name (e.g. google.com)" autofocus>
			<button id="scan">Scan</button>
		</div>
		<progress id="progress" value="0"></progress>
		<span id="status"></span>
		<table id="data"></table>
	</div>
</body>
<script>
window.onload = function() {
	if (window.location.hash) {
		$('#sid').val(window.location.hash.substring(1));
		fetchDomains();
	}
}

last_registered = 0;

function shareResults() {
	navigator.clipboard.writeText(window.location.href.split('#')[0] + '#' + sid);
	$('#status').html('Copied URL to clipboard!');
}

function fetchDomains() {
	$.getJSON('/api/scans/' + $('#sid').val() + '/domains', function(data) {
		$('#data').empty();
		$('<thead>').append(
			$('<tr>').html(
				'<th>PERMUTATION</th>' +
				'<th>IP ADDRESS</th>' +
				'<th>NAME SERVER</th>' +
				'<th>MAIL SERVER</th>'
			)
		).appendTo('#data');
		
		var tbody = $('<tbody>').appendTo('#data');
		
		$.each(data, function(i, item) {
			$.each(item, function(k, v) {
				if (v instanceof Array) {
					if (v[0] == '!ServFail') {
						data[i][k][0] = '🚫'
					}
				}
			})
			fuzzer = item['fuzzer'] || ''
			permutation = item['domain'] || ''
			ipaddr = [
				(item['dns_a'] || [''])[0],
				(item['dns_aaaa'] || [''])[0]
			].filter(Boolean).join('<br>');
			dns_ns = (item['dns_ns'] || [''])[0];
			dns_mx = (item['dns_mx'] || [''])[0];
			geoip = item['geoip'] || '';
			
			$('<tr>').html(
				'<td data-label="PERMUTATION">' + permutation + ' <a href="http://' + permutation + '" target="_blank">🔗</a><br><sup>' + fuzzer + '</sup></td>' +
				'<td data-label="IP ADDRESS">' + ipaddr + '<br><sup>' + geoip + '</sup></td>' +
				'<td data-label="NAME SERVER">' + dns_ns + '</td>' +
				'<td data-label="MAIL SERVER">' + dns_mx + '</td>'
			).appendTo(tbody);
		});
	});
}

function pollScan() {
    $.getJSON('/api/scans/' + $('#sid').val(), function(data) {
        $('#status').html('Processed ' + data['complete'] + ' of ' + data['total']);
        $('#progress').val(data['complete']/data['total']);
		if (data['remaining'] > 0) {
			setTimeout(pollScan, 250);
		} else {
			sid = $('#sid').val()
			$('#status').html('Scanned <a href="/api/scans/' + sid + '/list">' + data['complete'] + '</a> permutations. Found ' + data['registered'] + ' registered: <a href="#" onclick="shareResults()">share results</a> or download as <a href="/api/scans/' + sid + '/csv">CSV</a> <a href="/api/scans/' + sid + '/json">JSON</a>');
			$('#scan').text('Scan');
		}
		if (last_registered < data['registered']) {
			last_registered = data['registered']
			fetchDomains();
		}
    })
	.fail(function(){
		$('#status').html('Ups! Something went wrong...');
	});
}

function actionScan() {
	if (!$('#url').val()) {
		$('#status').html('↖ You need to type in a domain name first');
		return
	}

	if ($('#scan').text() == 'Scan') {
		last_registered = 0;
		$('#scan').text('⏱');
		$.post({
			url: '/api/scans',
			data: JSON.stringify({'url': $('#url').val()}),
			contentType: 'application/json',
			success: function(data) {
				$('#sid').val(data['id']);
				$('#url').val(data['domain']);
				$('#scan').text('Stop');
				pollScan();
			},
			error: function(xhr, status, error) {
				$('#scan').text('Scan');
				$('#status').html(xhr.responseJSON['message'] || 'Something went wrong');
			},
		});
	} else {
		$('#scan').text('⏱');
		$.post({
			url: '/api/scans/' + $('#sid').val() + '/stop',
			contentType: 'application/json',
		})
		.always(function() {
			$('#scan').text('Scan');
		});
	}
}

$('#scan').click(function() {
	actionScan();
});

$('#url').on('keypress',function(e) {
    if(e.which == 13) {
        actionScan();
    }
});
</script>
</html>
