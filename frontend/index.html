<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UAReady — Internationalised Email Composer</title>
<meta name="description" content="Validate and send internationalised email addresses with EAI, SMTPUTF8 and IDNA2008 compliance." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a18;--surface:rgba(15,23,42,.65);--surface-2:rgba(30,41,59,.5);
  --border:rgba(99,115,146,.2);--border-h:rgba(99,115,146,.35);
  --text:#e2e8f0;--muted:#8b9dc3;--accent:#6366f1;--accent-2:#818cf8;
  --good:#34d399;--bad:#fb7185;--warn:#fbbf24;
  --glow:rgba(99,102,241,.15);--radius:14px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;
  background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(99,102,241,.12),transparent 70%),
             radial-gradient(ellipse 60% 50% at 80% 100%,rgba(52,211,153,.06),transparent 60%);
  pointer-events:none}
.hero{text-align:center;padding:56px 24px 40px;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--border-h),transparent)}
.logo{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent-2);margin-bottom:12px;
  display:inline-flex;align-items:center;gap:8px}
.logo .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.hero h1{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,#e2e8f0 0%,#818cf8 50%,#34d399 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:12px}
.hero p{color:var(--muted);font-size:15px;max-width:600px;margin:0 auto}
main{max-width:880px;margin:0 auto;padding:32px 20px 80px}
.card{background:var(--surface);backdrop-filter:blur(16px);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;margin-bottom:20px;transition:border-color .3s,box-shadow .3s}
.card:hover{border-color:var(--border-h);box-shadow:0 0 40px var(--glow)}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
label{display:block;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
input[type="text"],textarea{width:100%;padding:12px 14px;background:rgba(15,23,42,.6);color:var(--text);
  border:1px solid var(--border);border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;
  transition:border-color .2s,box-shadow .2s}
textarea{font-size:14px;resize:vertical;min-height:160px}
input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:20px}
.wide{grid-column: span 2}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.btn{padding:11px 20px;border:0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s;position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 4px 20px rgba(99,102,241,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(99,102,241,.45)}
.btn-primary:disabled{opacity:0.6;cursor:wait;transform:none}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent-2)}
.status-line{font-weight:700;margin-bottom:16px;font-size:14px;padding:8px 16px;border-radius:99px;display:inline-flex;align-items:center;gap:8px}
.status-line.ok{background:rgba(52,211,153,.1);color:var(--good);border:1px solid rgba(52,211,153,.2)}
.status-line.bad{background:rgba(251,113,133,.1);color:var(--bad);border:1px solid rgba(251,113,133,.2)}
.summary{display:grid;grid-template-columns:200px 1fr;gap:8px 16px;margin-top:16px}
.summary dt{color:var(--muted);font-size:13px;font-weight:500}
.summary dd{margin:0;font-size:14px;overflow-wrap:anywhere}
.list{margin:16px 0 0;padding:0;list-style:none;display:grid;gap:8px}
.list li{padding:10px 14px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);font-size:14px}
.list li.error{color:var(--bad);border-color:rgba(251,113,133,.3)}
.list li.warn{color:var(--warn);border-color:rgba(251,191,36,.3)}
code,.mono{font-family:'JetBrains Mono',monospace;font-size:13px}
footer{text-align:center;padding:20px;color:var(--muted);font-size:12px;border-top:1px solid var(--border)}
footer a{color:var(--accent-2);text-decoration:none}
@media(max-width:700px){.grid{grid-template-columns:1fr}.wide{grid-column:span 1}
  .summary{grid-template-columns:1fr}main{padding:20px 12px}}
</style>
</head>
<body>

<section class="hero">
  <div class="logo"><span class="dot"></span> UAReady Mail</div>
  <h1>Send Internationalised Mail</h1>
  <p>Test EAI and SMTPUTF8 delivery with real-time validation of recipients and links.</p>
</section>

<main>
  <div class="card">
    <div class="card-title"><span class="icon"></span> Compose Message</div>
    <form id="mail-form" novalidate>
      <div class="grid">
        <label>
          <span>Recipient Email</span>
          <input id="recipient" name="recipient" type="text" autocomplete="off" spellcheck="false" placeholder="राम@नेपाल.नेपाल" required />
        </label>
        <label>
          <span>Your Name</span>
          <input id="sender-name" name="sender_name" type="text" autocomplete="name" placeholder="UAReady Mailer" />
        </label>
        <label class="wide">
          <span>Subject</span>
          <input id="subject" name="subject" type="text" placeholder="Hello from UAReady" required />
        </label>
        <label class="wide">
          <span>Message Body</span>
          <textarea id="body" name="body" placeholder="Write your email here..." required></textarea>
        </label>
      </div>
      <div class="actions">
        <button type="submit" id="send-btn" class="btn btn-primary">Validate &amp; Send</button>
        <button type="button" id="validate-btn" class="btn btn-secondary">Validate Only</button>
      </div>
    </form>
  </div>

  <div class="card" id="status-card" hidden>
    <div class="card-title"><span class="icon">📊</span> Delivery Status</div>
    <div id="status-line" class="status-line"></div>
    <dl class="summary" id="summary"></dl>
    <div id="messages"></div>
  </div>
</main>

<footer>
  <strong>UAReady</strong> - built for <a href="#">UA Adaptation Hackathon Nepal 2026</a> - ICANN
</footer>

<script src="app.js"></script>
</body>
</html>
